<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Événements — Nouvelle Perspective</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D4AF6A;--gold-light:#F0D49A;
  --navy:#0d1530;--white-soft:#F5EFE0;--cream:#EDE3C8;
}
html{scroll-behavior:smooth}
body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--navy);color:var(--white-soft);min-height:100vh;overflow-x:hidden}

/* === ANIMATED BG === */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0;animation:aurora-move 14s ease-in-out infinite}
.aurora-blob:nth-child(1){width:70vw;height:50vw;background:radial-gradient(ellipse,rgba(80,60,180,.38),transparent 70%);top:-10%;left:-15%;animation-delay:0s}
.aurora-blob:nth-child(2){width:55vw;height:45vw;background:radial-gradient(ellipse,rgba(212,175,106,.22),transparent 70%);top:20%;right:-10%;animation-delay:-5s}
.aurora-blob:nth-child(3){width:60vw;height:40vw;background:radial-gradient(ellipse,rgba(50,120,200,.25),transparent 70%);bottom:10%;left:20%;animation-delay:-9s}
@keyframes aurora-move{
  0%{opacity:0;transform:scale(1) translateY(0)}
  15%{opacity:1}
  50%{transform:scale(1.15) translateY(-4%)}
  85%{opacity:1}
  100%{opacity:0;transform:scale(1) translateY(0)}
}
.light-halo{position:fixed;top:-10vw;left:50%;transform:translateX(-50%);width:90vw;height:65vw;background:radial-gradient(ellipse at 50% 0%,rgba(212,175,106,.28) 0%,transparent 68%);z-index:0;pointer-events:none;animation:halo-pulse 5s ease-in-out infinite}
@keyframes halo-pulse{0%,100%{opacity:.5}50%{opacity:1}}

.page{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:0 1.5rem 5rem}

/* HEADER */
header{text-align:center;padding:5rem 1rem 3rem}
.church-tag{display:inline-block;font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.38em;color:var(--gold);text-transform:uppercase;margin-bottom:1.4rem;opacity:.9;animation:slide-down .9s .1s ease both}
.cross-wrap{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:2rem;animation:slide-down .9s .25s ease both}
.cross-wrap .line{display:block;height:1px;width:90px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.cross-svg{width:28px;height:36px;fill:none;stroke:var(--gold);stroke-width:2;stroke-linecap:round;filter:drop-shadow(0 0 8px rgba(212,175,106,.8));animation:cross-glow 3s ease-in-out infinite}
@keyframes cross-glow{0%,100%{filter:drop-shadow(0 0 4px rgba(212,175,106,.5))}50%{filter:drop-shadow(0 0 16px rgba(212,175,106,1))}}

/* LOGO IMAGE TITRE */
.logo-titre{animation:slide-down .9s .4s ease both;margin-bottom:1.6rem}
.logo-titre img{max-width:420px;width:85%;height:auto;display:inline-block;filter:drop-shadow(0 4px 24px rgba(212,175,106,.35))}

.subtitle{font-size:1.3rem;font-style:italic;color:var(--cream);opacity:.85;letter-spacing:.03em;margin-bottom:1.6rem;animation:slide-down .9s .55s ease both}
.header-verse{display:inline-block;font-size:1.05rem;font-style:italic;color:var(--gold-light);opacity:.75;max-width:480px;line-height:1.7;animation:slide-down .9s .7s ease both}
@keyframes slide-down{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:translateY(0)}}

/* SECTION TITLE */
.section-title{text-align:center;margin:4rem 0 2.2rem}
.section-title h2{font-family:'Cinzel',serif;font-size:1.3rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
.sub-line{display:flex;align-items:center;justify-content:center;gap:.9rem;margin-top:.55rem}
.sub-line span{height:1px;width:65px;background:linear-gradient(90deg,transparent,rgba(212,175,106,.5))}
.sub-line span:last-child{background:linear-gradient(90deg,rgba(212,175,106,.5),transparent)}
.sub-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.65}

/* GRIDS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:580px){.two-col{grid-template-columns:1fr}}
.one-col{display:flex;flex-direction:column;gap:1.5rem}

/* CARD */
.card{position:relative;border-radius:18px;overflow:hidden;border:1px solid rgba(212,175,106,.22);background:linear-gradient(148deg,rgba(255,255,255,.07) 0%,rgba(255,255,255,.02) 100%);backdrop-filter:blur(4px);opacity:0;transform:translateY(40px);transition:opacity .65s ease,transform .65s cubic-bezier(.22,1,.36,1),border-color .35s,box-shadow .35s}
.card.visible{opacity:1;transform:translateY(0)}
.card:hover{transform:translateY(-6px) scale(1.008)!important;border-color:rgba(212,175,106,.62);box-shadow:0 14px 50px rgba(212,175,106,.2),0 4px 14px rgba(0,0,0,.6)}
.card.featured{border-color:rgba(212,175,106,.4);background:linear-gradient(148deg,rgba(212,175,106,.1) 0%,rgba(255,255,255,.02) 100%)}
.card.highlight{border-color:rgba(212,175,106,.7);box-shadow:0 0 30px rgba(212,175,106,.1)}

/* IMAGE — FULL VISIBLE */
.card-img-wrap{position:relative;width:100%;overflow:hidden;background:#111827}
.card-img-wrap img{width:100%;height:auto;display:block;object-fit:contain;object-position:center top;transition:transform .7s cubic-bezier(.22,1,.36,1)}
.card:hover .card-img-wrap img{transform:scale(1.04)}
.card-img-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:30%;background:linear-gradient(to top,rgba(13,21,48,.7) 0%,transparent 100%);pointer-events:none}

/* PLACEHOLDER IMAGE */
.card-img-placeholder{width:100%;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;background:rgba(212,175,106,.05);border-bottom:1px dashed rgba(212,175,106,.25);padding:1.5rem;color:rgba(212,175,106,.5);font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;text-align:center}
.card-img-placeholder svg{width:32px;height:32px;stroke:rgba(212,175,106,.35);fill:none;stroke-width:1.5}

/* CARD BODY */
.card-body{padding:1.5rem 1.7rem 1.9rem}

/* BADGE */
.card-badge{display:inline-flex;align-items:center;gap:6px;font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);background:rgba(212,175,106,.12);border:1px solid rgba(212,175,106,.3);padding:4px 13px;border-radius:20px;margin-bottom:1rem}
.dot-b{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse-dot 2.2s ease infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.6)}}

/* TEXT */
.card h3{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:700;line-height:1.3;margin-bottom:.6rem;letter-spacing:.02em}
.card h3 a{color:var(--gold-light);text-decoration:none;transition:color .2s}
.card h3 a:hover{color:#fff;text-decoration:underline;text-underline-offset:3px}
.card h3.nl{color:var(--gold-light)}
.card-date{font-size:1.1rem;font-style:italic;color:var(--cream);opacity:.9;margin-bottom:.5rem;line-height:1.5}
.pastors{font-size:.95rem;font-style:italic;color:var(--gold-light);opacity:.75;margin-bottom:.3rem}
.card-addr{display:flex;gap:7px;align-items:flex-start;font-size:.92rem;color:var(--cream);opacity:.65;line-height:1.5;margin-top:.4rem}
.card-addr .pin{flex-shrink:0;margin-top:2px}
.card-addr .pin svg{width:13px;height:13px;stroke:var(--gold);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* RIBBON */
.ribbon{position:absolute;top:0;right:0;z-index:2;background:linear-gradient(135deg,var(--gold) 0%,#BF8E44 100%);color:var(--navy);font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 18px 6px 12px;border-radius:0 17px 0 11px;font-weight:700}

/* AGENDA BANNER */
.agenda-banner{position:relative;border-radius:16px;overflow:hidden;border:1px solid rgba(212,175,106,.3);margin-bottom:2.2rem;opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.agenda-banner.visible{opacity:1;transform:translateY(0)}
.agenda-banner img{width:100%;height:auto;display:block;object-fit:contain}
.agenda-banner .banner-label{position:absolute;bottom:0;left:0;right:0;padding:.8rem 1.3rem;background:linear-gradient(to top,rgba(13,21,48,.85),transparent);font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}

/* PARTICLES */
.particle{position:fixed;border-radius:50%;pointer-events:none;z-index:0;background:rgba(212,175,106,.5);animation:float-up linear infinite}
@keyframes float-up{0%{transform:translateY(100vh) scale(0);opacity:0}8%{opacity:.8}85%{opacity:.2}100%{transform:translateY(-30px) scale(1.2);opacity:0}}

footer{text-align:center;margin-top:4rem;padding-top:2rem;border-top:1px solid rgba(212,175,106,.14);font-size:.95rem;color:var(--cream);opacity:.55;font-style:italic;letter-spacing:.05em}
footer strong{display:block;font-family:'Cinzel',serif;color:var(--gold);opacity:.8;font-size:.95rem;margin-bottom:.3rem;font-style:normal;letter-spacing:.15em}
</style>
</head>

  return `<div class="card-img-wrap"><img src="${src}" alt="" loading="lazy"></div>`;
}

function body(e,lien,imgKey){
  const t=lien?`<a href="${lien}" target="_blank" rel="noopener">${e.titre}</a>`:`<span class="nl">${e.titre}</span>`;
  return `<div class="card-body">
    <div class="card-badge"><div class="dot-b"></div>${e.badge}</div>
    <h3>${t}</h3>
    ${e.date?`<p class="card-date">${e.date}</p>`:''}
    ${e.pasteurs?`<p class="pastors">${e.pasteurs}</p>`:''}
    ${e.adresse?`<div class="card-addr">${PIN}<span>${e.adresse.replace(/\n/g,'<br>')}</span></div>`:''}
  </div>`;
}

// Fix logo titre
document.querySelector('.logo-titre img').src = IMAGES.titre;

if(AGENDA_BANNER.image && !AGENDA_BANNER.image.startsWith('URL_IMAGE_')){
  document.getElementById('banner').innerHTML=
    `<div class="agenda-banner"><img src="${AGENDA_BANNER.image}" alt="${AGENDA_BANNER.legende}">
    ${AGENDA_BANNER.legende?`<div class="banner-label">${AGENDA_BANNER.legende}</div>`:''}</div>`;
}

document.getElementById('rec').innerHTML=
  REUNIONS.map((e,i)=>`<div class="card">${imgWrap(e.image,['etude','intercession'][i])}${body(e,'')}</div>`).join('');

document.getElementById('evts').innerHTML=
  EVENEMENTS.map((e,i)=>`<div class="card featured ${e.highlight?'highlight':''}">
    ${e.ribbon?`<div class="ribbon">${e.ribbon}</div>`:''}
    ${imgWrap(e.image,['femmes','guerison','convention'][i])}${body(e,e.lien)}</div>`).join('');

/* Scroll reveal */
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
},{threshold:0.07,rootMargin:'0px 0px -30px 0px'});
document.querySelectorAll('.card,.agenda-banner').forEach((el,i)=>{
  el.style.transitionDelay=(i*0.11)+'s'; obs.observe(el);
});

/* Starfield */
(function(){
  const cv=document.getElementById('bg-canvas'),ctx=cv.getContext('2d');
  let W,H,S=[];
  function resize(){W=cv.width=window.innerWidth;H=cv.height=Math.max(window.innerHeight,document.body.scrollHeight);}
  function init(){S=[];const n=Math.floor(W*H/2200);for(let i=0;i<n;i++)S.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.8+.2,sp:Math.random()*.013+.003,ph:Math.random()*Math.PI*2});}
  let f=0;
  function draw(){ctx.clearRect(0,0,W,H);const t=f*.016;S.forEach(s=>{const a=.25+.75*(.5+.5*Math.sin(s.ph+t*s.sp*60));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(240,218,155,${a*.9})`;ctx.fill();});f++;requestAnimationFrame(draw);}
  resize();init();draw();
  window.addEventListener('resize',()=>{resize();init();});
})();

/* Floating particles */
(function(){
  const h=document.getElementById('phost');
  function spawn(){
    const p=document.createElement('div');p.className='particle';
    const s=Math.random()*3+.5;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;bottom:-10px;animation-duration:${Math.random()*14+8}s;animation-delay:${Math.random()*4}s`;
    h.appendChild(p);setTimeout(()=>p.remove(),22000);
  }
  setInterval(spawn,700);
})();
</script>
